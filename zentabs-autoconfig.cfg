// ZenTabsManager - Automated Tab Management for Zen Browser
// This file is loaded at browser startup via autoconfig

const { Services } = ChromeUtils.import("resource://gre/modules/Services.jsm");
const { PathUtils } = ChromeUtils.importESModule("resource://gre/modules/PathUtils.sys.mjs");

// Get profile chrome directory
const chromeDir = PathUtils.join(PathUtils.profileDir, "chrome");
const zentabsDir = PathUtils.join(chromeDir, "zentabs");

// Function to load ZenTabsManager when browser window opens
function loadZenTabsManager(window) {
    if (!window || window.location.href !== "chrome://browser/content/browser.xhtml") {
        return;
    }

    try {
        // Load the main ZenTabsManager module
        const scriptPath = PathUtils.toFileURI(PathUtils.join(zentabsDir, "engine", "zen.sys.mjs"));
        
        ChromeUtils.importESModule(scriptPath, { global: window })
            .then(() => {
                console.log("[ZenTabs]: Successfully loaded");
            })
            .catch(err => {
                console.error("[ZenTabs]: Failed to load:", err);
            });
    } catch (err) {
        console.error("[ZenTabs]: Error loading ZenTabsManager:", err);
    }
}

// Window observer to inject into all browser windows
const windowObserver = {
    observe(subject, topic) {
        if (topic === "domwindowopened") {
            const window = subject;
            window.addEventListener("load", function onLoad() {
                window.removeEventListener("load", onLoad);
                loadZenTabsManager(window);
            }, { once: true });
        }
    }
};

// Register window observer
Services.ww.registerNotification(windowObserver);

// Load into any existing windows
const windows = Services.wm.getEnumerator("navigator:browser");
while (windows.hasMoreElements()) {
    const window = windows.getNext();
    loadZenTabsManager(window);
}

console.log("[ZenTabs]: Autoconfig initialized");
